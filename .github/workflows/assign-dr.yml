name: assign-dr

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign Dr to unassigned records
        run: |
          node << 'EOF'
          const PROJECT = 'p-file-19631';
          const API_KEY = 'AIzaSyBAzYz_XSMGqAQcXMJuwYF9bclcyDj2tNY';

          async function main() {
            const authRes = await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=' + API_KEY, {
              method: 'POST', headers: {'Content-Type':'application/json'},
              body: JSON.stringify({returnSecureToken: true})
            });
            const { idToken: token } = await authRes.json();

            const base = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents`;
            const headers = { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' };

            const dmDoc = await (await fetch(`${base}/records/device-map`, { headers })).json();
            const deviceMap = JSON.parse(dmDoc.fields?.json?.stringValue || '[]');

            const recsData = await (await fetch(`${base}/records?pageSize=100`, { headers })).json();
            const docs = recsData.documents || [];

            let fixed = 0;
            for (const doc of docs) {
              const f = doc.fields || {};
              const dr     = f.dr?.stringValue || '';
              const t      = f.t?.stringValue  || '';
              const p      = f.p?.stringValue  || '';
              const source = f.source?.stringValue || '';
              const docId  = doc.name.split('/').pop();

              if (docId === 'device-map') continue;
              if (dr) continue;

              const isPlaud = source === 'plaud_auto'
                || t.includes('[Plaud-AutoFlow]')
                || p.includes('[Plaud-AutoFlow]');
              if (!isPlaud) continue;

              const toAddr = f.to?.stringValue || '';
              let assignedDr = '';
              for (const entry of deviceMap) {
                if (toAddr.toLowerCase().includes(entry.keyword.toLowerCase())) {
                  assignedDr = entry.dr;
                  break;
                }
              }
              if (!assignedDr && deviceMap.length === 1) assignedDr = deviceMap[0].dr;
              if (!assignedDr) continue;

              await fetch(`${base}/records/${docId}?updateMask.fieldPaths=dr`, {
                method: 'PATCH', headers,
                body: JSON.stringify({ fields: { dr: { stringValue: assignedDr } } })
              });
              console.log(`assigned ${assignedDr} to ${docId}`);
              fixed++;
            }
            console.log(`done: ${fixed} records updated`);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF
